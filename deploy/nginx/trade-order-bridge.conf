# Nginx snippet for trade-order-bridge on app.gandhar.in
#
# - Keep UI/admin paths behind Authelia auth_request
# - Keep webhook endpoint unauthenticated by Authelia; app validates auth_key

location /trade-order-bridge/ {
    auth_request /authelia-auth;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Host $host;
    proxy_pass http://127.0.0.1:8000/;
}

location = /webhooks/tradingview/ibkr {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Host $host;

    # Conservative request size/rate defaults for webhook traffic
    client_max_body_size 32k;

    proxy_pass http://127.0.0.1:8000/webhooks/tradingview/ibkr;
}
